<!doctype html>
<html lang="en">
  <head>
    <!-- 🌐 Meta setup -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🌈 Theme + Color Modes -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />

    <!-- 📱 App Manifest + Favicon -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/nav-icon.png" />

    <!-- 🧠 SEO -->
    <title>CampusCart</title>
    <meta
      name="description"
      content="Buy, sell, or share your campus essentials — CampusCart, your smart student marketplace!"
    />
    <meta
      name="keywords"
      content="CampusCart, college marketplace, student buy sell, used books, gadgets, notes, campus store"
    />
    <meta name="author" content="CampusCart Team" />

    <!-- 🍎 Apple PWA Setup -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CampusCart" />

    <!-- 🎨 FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
